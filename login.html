<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Login | Teacher Feature Hub</title>
    <!-- Shared CSS — same stylesheet used by all hub pages -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-shell">
      <div class="top-inner">
        <div class="title-group">
          <h1>Teacher Feature Hub</h1>
          <p>Redirecting to Team Com login...</p>
        </div>
      </div>
    </header>

    <main class="auth-wrap app-main" style="max-width: 560px;">
      <section class="auth-card panel-shell">
        <h1>Team Login Required</h1>
        <p>Please sign in with Team Com to continue.</p>
        <p>
          <a class="ghost-btn" href="http://127.0.0.1:5000/auth/login?next=%2F">Go to Team Com Login</a>
        </p>
      </section>
    </main>

    <script>
      window.location.replace("http://127.0.0.1:5000/auth/login?next=%2F");
    </script>
  </body>
</html>
