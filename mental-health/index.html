<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Mental Health | Teacher Feature Hub</title>
    <!-- Uses the shared hub CSS from the parent folder -->
    <link rel="stylesheet" href="../style.css" />
    <script>
      if (window.location.port === "5500") {
        window.location.replace("http://127.0.0.1:5000/auth/login?next=%2F");
      }
    </script>
  </head>
  <body>
    <!-- Top header bar with Home link and Logout button (same pattern as all feature pages) -->
    <header class="top-shell">
      <div class="top-inner">
        <div class="title-group">
          <h1>Teacher Feature Hub</h1>
          <p>Student wellbeing and early support insights.</p>
        </div>
        <div class="top-actions">
          <a class="ghost-btn" href="../index.html">Home</a>
          <form method="POST" action="http://127.0.0.1:5000/auth/logout" style="margin: 0;">
            <button class="ghost-btn" type="submit">Log out</button>
          </form>
        </div>
      </div>
    </header>

    <!--
      CHATBOT EMBED
      The mental health feature uses a Chatbase AI chatbot embedded via an <iframe>.
      Chatbase is an external service that hosts a trained AI assistant.
      The allow="microphone" attribute is needed if voice input is enabled in
      the Chatbase chatbot configuration.
      All conversation data stays within Chatbase — nothing is stored locally.
    -->
    <main class="feature-page app-main">
      <section class="page-panel">
        <iframe
          class="mental-chat-embed"
          src="https://www.chatbase.co/chatbot-iframe/GXtBty11jsW6jKarAbabw"
          width="100%"
          frameborder="0"
          allow="microphone"
        ></iframe>
      </section>
    </main>

  </body>
</html>
