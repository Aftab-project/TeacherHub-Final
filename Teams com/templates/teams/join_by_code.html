{% extends "base.html" %}

<!--
    teams/join_by_code.html
    Purpose: Join an existing team using 8-character invite code.
-->

{% block title %}Join Team - Team Collaboration Platform{% endblock %}

{% block content %}
<div class="container">
    <!-- Centered narrow layout for single-input flow -->
    <div style="max-width: 500px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Join a Team</h1>
        
        <div class="card">
            <div class="card-body">
                <!-- Instruction text shown before form -->
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
                    Enter the team code to join an existing team.
                </p>
                
                <!-- Form posts code to teams.join_by_code route -->
                <form method="POST">
                    <div class="form-group">
                        <!-- Styled as uppercase invite-code input -->
                        <label for="code">Team Code</label>
                        <input type="text" id="code" name="code" required placeholder="e.g., ABC123DE" style="font-size: 1.25rem; text-align: center; letter-spacing: 2px;" maxlength="8">
                        <small style="display: block; text-align: center; color: var(--text-secondary);">8-character code provided by the team owner</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Join Team</button>
                </form>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Don't have a team code? <a href="{{ url_for('teams.create_team') }}">Create your own team</a>
        </p>
    </div>
</div>
{% endblock %}
