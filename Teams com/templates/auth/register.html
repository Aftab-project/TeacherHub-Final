{% extends "base.html" %}

<!--
    auth/register.html
    Purpose: Create a new account.
    Validation hints are provided in input attributes (min/max length, required).
-->

{% block title %}Register - Team Collaboration Platform{% endblock %}

{% block content %}
<div class="container">
    <!-- Narrow centered layout keeps form easy to scan -->
    <div style="max-width: 400px; margin: 0 auto;">
        <!-- Registration heading -->
        <h1 style="text-align: center; margin-bottom: 2rem;">Create Account</h1>
        
        <div class="card">
            <div class="card-body">
                <!-- Form POSTs to /auth/register -->
                <form method="POST">
                    <div class="form-group">
                        <!-- Username used for mentions/login lookup -->
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required minlength="3" maxlength="50" placeholder="Choose a unique username">
                    </div>
                    
                    <div class="form-group">
                        <!-- Email is unique across users -->
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <!-- Optional profile detail -->
                        <label for="first_name">First Name (Optional)</label>
                        <input type="text" id="first_name" name="first_name" placeholder="John">
                    </div>
                    
                    <div class="form-group">
                        <!-- Optional profile detail -->
                        <label for="last_name">Last Name (Optional)</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Doe">
                    </div>
                    
                    <div class="form-group">
                        <!-- Password minimum length hint mirrors backend validation -->
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
                    </div>
                    
                    <div class="form-group">
                        <!-- Double-entry confirmation prevents typing mistakes -->
                        <label for="password_confirm">Confirm Password</label>
                        <input type="password" id="password_confirm" name="password_confirm" required minlength="8" placeholder="Re-enter your password">
                    </div>
                    
                    <!-- Submit registration -->
                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                </form>
            </div>
        </div>
        
        <!-- Link for existing users -->
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
